<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ詳細 | KAORI MUSUBI Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-reference page-admin-inquiry-detail">
  <main class="main">
    <section class="page-section">
      <div class="container" style="max-width: 960px;">
        <div class="page-admin-inquiry-detail__header">
          <h1 class="card-title">お問い合わせ詳細</h1>
          <div class="page-admin-inquiry-detail__actions">
            <a class="btn btn--primary" th:if="${isAdmin}" th:href="@{/admin/users}">ユーザー一覧</a>
            <a class="btn btn--primary" th:href="@{/admin/inquiries(page=${returnPage})}">一覧へ戻る</a>
            <form th:action="@{/admin/logout}" method="post" style="margin:0;">
              <input type="hidden" th:attr="name=${_csrf != null ? _csrf.parameterName : null},value=${_csrf != null ? _csrf.token : null}">
              <button class="btn btn--primary" type="submit">ログアウト</button>
            </form>
          </div>
        </div>

        <section class="contact-card page-admin-inquiry-detail__card">
          <dl class="page-admin-inquiry-detail__grid">
            <div class="page-admin-inquiry-detail__row">
              <dt>No</dt>
              <dd th:text="${rowNumber}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>ID</dt>
              <dd th:text="${contact.id}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>受信日時</dt>
              <dd th:text="${#temporals.format(contact.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>種別</dt>
              <dd th:text="${contact.inquiryType}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>言語</dt>
              <dd th:text="${contact.englishPage ? 'EN' : 'JP'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>名前</dt>
              <dd th:text="${contact.name}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>メール</dt>
              <dd th:text="${contact.email}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>電話番号</dt>
              <dd th:text="${contact.phoneNumber != null ? contact.phoneNumber : '-'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>連絡方法</dt>
              <dd th:text="${contact.contactMethod != null ? contact.contactMethod : '-'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>プラン</dt>
              <dd th:text="${contact.plan != null ? contact.plan : '-'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>希望日</dt>
              <dd th:text="${contact.preferredDate != null ? #temporals.format(contact.preferredDate, 'yyyy-MM-dd') : '-'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row">
              <dt>希望内容</dt>
              <dd th:text="${contact.requestTypes != null ? contact.requestTypes : '-'}"></dd>
            </div>
            <div class="page-admin-inquiry-detail__row page-admin-inquiry-detail__row--message">
              <dt>本文</dt>
              <dd th:text="${contact.message}"></dd>
            </div>
          </dl>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
