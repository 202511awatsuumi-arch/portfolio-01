spring.application.name=spring-app
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.datasource.url=jdbc:h2:file:./data/portfolio-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.settings.web-allow-others=${H2_CONSOLE_WEB_ALLOW_OTHERS:false}
spring.h2.console.settings.web-admin-password=${H2_CONSOLE_WEB_ADMIN_PASSWORD:}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
mybatis.mapper-locations=classpath:/mapper/*.xml
app.admin.username=admin
app.admin.password=admin1234
